<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rishuu ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<!-- ========================= -->
<!-- PREMIUM LOADING SCREEN -->
<!-- ========================= -->

<div id="loading-screen">

    <div class="stars"></div>

    <div class="loader-box">

        <div class="heart-loader">❤️</div>

        <h2 class="loading-title">
            A Little Gift From Your
            <br>
            <span>Rasgulla ❤️</span>
        </h2>

        <p id="loadingMessage">
            Preparing something magical...
        </p>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <div id="percent">
            0%
        </div>

    </div>

</div>

<!-- ========================= -->
<!-- WELCOME PAGE -->
<!-- ========================= -->

<section id="welcome">

    <div class="overlay"></div>

    <div class="welcome-content">

        <h3>
            🌹 Happy Birthday 🌹
        </h3>

        <h1>
            Rishuu ❤️
        </h1>

        <p>

            Every flower blooms beautifully...

            But today,

            the most beautiful one is celebrating
            her birthday.

        </p>

        <button id="startBtn">

            🎁 Open My Surprise

        </button>

    </div>

</section>

<!-- Falling Rose Petals -->
<div id="petals"></div>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- Sparkles -->
<div id="sparkles"></div>

<script src="script.js"></script>

</body>
</html>
