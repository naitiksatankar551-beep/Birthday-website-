<!DOCTYPE html>
<html lang="en">

<head>

    <title>A Little Gift ❤️</title>

</head>

<body>

    <!-- Background Hearts -->
    <div class="hearts"></div>

    <!-- Background Sparkles -->

    <!-- Main Card -->

        <div class="glass-card">

            <h2 class="small-title">
                A Little Gift From
            </h2>

            <h1 class="main-title">
                Your Naitik ❤️
            </h1>

            <p class="subtitle">
                Made only for my Rasmalai 🥰
            </p>

            <button id="startBtn">
                Open My Surprise ✨
            </button>

        </div>

    </div>

    <!-- Floating Hearts -->
    <div class="floating-hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💗</span>
        <span>💞</span>
        <span>💓</span>
        <span>💘</span>

    <script src="script.js"></script>
